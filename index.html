<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>중계JLS 운영 대시보드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:#0F172A;min-height:100vh}
.bg{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0F172A 0%,#1E3A5F 50%,#0F172A 100%)}
.bg::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(46,109,164,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(29,158,117,.1) 0%,transparent 50%);pointer-events:none}
.page{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:60px 24px 48px}
.header{text-align:center;margin-bottom:56px}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:14px}
.header h1{font-size:36px;font-weight:900;color:#fff;line-height:1.2;margin-bottom:12px;letter-spacing:-.02em}
.header h1 span{background:linear-gradient(135deg,#60A5FA,#34D399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{font-size:14px;color:rgba(255,255,255,.75)}
.date-chip{display:inline-flex;align-items:center;gap:6px;margin-top:16px;font-size:12px;color:rgba(255,255,255,.6);background:rgba(255,255,255,.06);padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.08)}
.wrap{width:100%;max-width:800px}
.section-label{font-size:15px;font-weight:700;color:#fff;margin-bottom:14px;margin-top:36px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:24px 22px;text-decoration:none;display:flex;align-items:center;gap:18px;transition:all .25s;backdrop-filter:blur(10px)}
.card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.08);box-shadow:0 20px 40px rgba(0,0,0,.3)}
.card.disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.ic-blue{background:linear-gradient(135deg,#1D4ED8,#3B82F6)}
.ic-green{background:linear-gradient(135deg,#059669,#10B981)}
.ic-orange{background:linear-gradient(135deg,#D97706,#F59E0B)}
.ic-purple{background:linear-gradient(135deg,#7C3AED,#A78BFA)}
.info{flex:1;min-width:0}
.info h2{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
.info p{font-size:11px;color:rgba(255,255,255,.7);line-height:1.5}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 9px;border-radius:10px;font-weight:600;margin-top:7px}
.badge-live{background:rgba(52,211,153,.15);color:#34D399;border:1px solid rgba(52,211,153,.2)}
.badge-soon{background:rgba(251,191,36,.1);color:#FBbf24;border:1px solid rgba(251,191,36,.15)}
.live-dot{width:5px;height:5px;border-radius:50%;background:#34D399;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.arrow{color:rgba(255,255,255,.2);font-size:18px;flex-shrink:0;transition:all .25s}
.card:hover .arrow{color:rgba(255,255,255,.6);transform:translateX(3px)}
.footer{margin-top:48px;text-align:center;font-size:12px;color:rgba(255,255,255,.5);line-height:1.8}
</style>
</head>
<body>
<div class="bg"></div>
<div class="page">
  <div class="header">
    <div class="eyebrow">Operations Center</div>
    <h1>중계JLS<br><span>운영 대시보드</span></h1>
    <p>업무 현황을 한눈에 확인하고 관리하세요</p>
    <div class="date-chip">📅 2026년 06월 기준</div>
  </div>

  <div class="wrap">
    <div class="section-label">📊 상담 관리</div>
    <div class="grid">
      <a class="card" href="상담모니터링_최종.html">
        <div class="icon ic-blue">📊</div>
        <div class="info">
          <h2>상담 모니터링</h2>
          <p>해피콜 · 상담콜 · 진급콜<br>선생님별 달성률 현황</p>
          <span class="badge badge-live"><span class="live-dot"></span>운영중</span>
        </div>
        <div class="arrow">›</div>
      </a>
      <a class="card disabled" href="#">
        <div class="icon ic-purple">📈</div>
        <div class="info">
          <h2>온라인 이수율</h2>
          <p>온라인 강의 수강 현황<br>및 이수율 집계</p>
          <span class="badge badge-soon">준비중</span>
        </div>
        <div class="arrow">›</div>
      </a>
    </div>

    <div class="section-label">🚌 셔틀 관리</div>
    <div class="grid">
      <a class="card" href="shuttle_timetable_202606.html">
        <div class="icon ic-green">🚌</div>
        <div class="info">
          <h2>셔틀 시간표</h2>
          <p>중계분원 노선별<br>셔틀 운행 시간표</p>
          <span class="badge badge-live"><span class="live-dot"></span>운영중</span>
        </div>
        <div class="arrow">›</div>
      </a>
      <a class="card" href="SHUTTLEFINDER_20260608.html">
        <div class="icon ic-orange">🔍</div>
        <div class="info">
          <h2>셔틀 파인더</h2>
          <p>중계정상어학원<br>정류장 검색 및 탑승 안내</p>
          <span class="badge badge-live"><span class="live-dot"></span>운영중</span>
        </div>
        <div class="arrow">›</div>
      </a>
    </div>
  </div>

  <div class="footer">
    중계JLS 어학원 · 운영지원팀<br>
    문의사항은 담당자에게 연락해주세요
  </div>
</div>
</body>
</html>
