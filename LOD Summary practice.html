<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOD STORY SUMMARY PRACTICE</title>
<style>
  :root {
    --blue: #2d6cdf;
    --green: #2e9e5b;
    --red: #e0473f;
    --bg: #f5f7fb;
    --card: #ffffff;
    --border: #dfe4ee;
    --text: #23272f;
    --muted: #7a8195;
    --blank-bg: #eef4ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Malgun Gothic", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px 16px 80px;
  }
  .wrap { max-width: 860px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: 0.3px; }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 14px; }

  .tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .tab-btn {
    border: none; border-radius: 10px; padding: 10px 18px; font-size: 14px; font-weight: 700;
    cursor: pointer; background: #eef1f7; color: #555;
  }
  .tab-btn.active { background: var(--blue); color: #fff; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .toolbar {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 16px; margin-bottom: 18px;
  }
  .toolbar label { font-size: 13px; color: var(--muted); margin-right: 2px; }
  select {
    padding: 7px 10px; border-radius: 8px; border: 1px solid var(--border);
    font-size: 14px; background: #fff;
  }
  button {
    border: none; border-radius: 9px; padding: 9px 16px; font-size: 14px; cursor: pointer;
    font-weight: 600;
  }
  button:hover { opacity: .85; }
  .btn-primary { background: var(--blue); color: #fff; }
  .btn-green { background: var(--green); color: #fff; }
  .btn-ghost { background: #eef1f7; color: #444; }
  .btn-nav { background: #fff; border: 1px solid var(--border); color: #444; }
  .btn-print { background: #444; color: #fff; }

  .font-controls { display: flex; gap: 6px; align-items: center; margin-left: auto; }
  .font-controls button { padding: 5px 11px; font-size: 13px; background:#eef1f7; color:#444; }

  .progress-dots { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .dot {
    width: 26px; height: 26px; border-radius: 7px; display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; cursor: pointer; border: 1px solid var(--border); background: #fff; color: #999;
  }
  .dot.current { border-color: var(--blue); color: var(--blue); background: #eef4ff; }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px 24px 22px; margin-bottom: 16px;
  }
  .qnum { font-size: 13px; color: var(--blue); font-weight: 700; margin-bottom: 8px; }
  .qtext { font-size: 19px; font-weight: 700; margin-bottom: 10px; line-height: 1.5; }
  .astem { font-size: 17px; font-weight: 600; margin-bottom: 16px; color: #333; }
  .answer {
    font-size: 21px; line-height: 2.4; color: #222;
  }
  .blank {
    display: inline-block; min-width: 46px; text-align: center;
    border-bottom: 3px solid var(--blue); border-radius: 4px;
    padding: 0 6px; margin: 0 2px; cursor: pointer; user-select: none;
    background: var(--blank-bg); color: var(--blank-bg); font-weight: 700;
    transition: background .12s, color .12s;
  }
  .blank.revealed {
    background: #e6f7ec; color: var(--green); border-bottom-color: var(--green);
  }
  .blank:hover { filter: brightness(0.95); }
  .blank.static {
    background: #f0f0f0; color: #f0f0f0; cursor: default; border-bottom-color: #999;
  }
  .blank.static.filled-correct { background: #e6f7ec; color: var(--green); border-bottom-color: var(--green); }
  .blank.static.filled-wrong { background: #fdeceb; color: var(--red); border-bottom-color: var(--red); }

  .choices { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
  .choice-btn {
    background: #fff; border: 2px solid var(--border); color: #333; padding: 10px 18px;
    border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .choice-btn:hover { border-color: var(--blue); }
  .choice-btn.correct { background: #e6f7ec; border-color: var(--green); color: var(--green); }
  .choice-btn.wrong { background: #fdeceb; border-color: var(--red); color: var(--red); }
  .choice-btn:disabled { cursor: default; opacity: 0.9; }

  .actions { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }

  #printArea { display: none; }
  .print-q { margin-bottom: 14px; page-break-inside: avoid; }
  .print-qnum { font-size: 12px; font-weight: 700; color: #555; }
  .print-qtext { font-size: 14px; font-weight: 700; margin: 2px 0 6px; }
  .print-answer { font-size: 14px; line-height: 2; }
  .print-blank-line { display: inline-block; border-bottom: 1.5px solid #333; min-width: 60px; }
  .print-blank-answer { text-decoration: underline; font-weight: 700; }
  .print-choices { font-size: 13px; color: #333; margin-top: 2px; }
  .print-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
  .print-sub { font-size: 11px; color: #666; margin-bottom: 14px; }

  @media print {
    body * { visibility: hidden; }
    #printArea, #printArea * { visibility: visible; }
    #printArea { display: block; position: absolute; left: 0; top: 0; width: 100%; padding: 0 10px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>LOD STORY SUMMARY PRACTICE</h1>
  <div class="sub">중계분원 LOD Practice Program</div>

  <div class="tabs">
    <button class="tab-btn active" id="tabStoryBtn">스토리 서머리</button>
    <button class="tab-btn" id="tabGrammarBtn">그래머 퀴즈</button>
  </div>

  <!-- STORY SUMMARY TAB -->
  <div class="tab-panel active" id="storyPanel">
    <div class="toolbar">
      <label>스토리</label>
      <select id="storySelect"></select>
      <label>빈칸 개수</label>
      <select id="difficultySelect">
        <option value="fixed" selected>기본(고정)</option>
        <option value="0.15">적게(랜덤)</option>
        <option value="0.28">보통(랜덤)</option>
        <option value="0.42">많이(랜덤)</option>
      </select>
      <div class="font-controls">
        <button id="fontDown">가-</button>
        <button id="fontUp">가+</button>
      </div>
    </div>

    <div class="progress-dots" id="dots"></div>

    <div class="card">
      <div class="qnum" id="qnum"></div>
      <div class="qtext" id="qtext"></div>
      <div class="answer" id="answer"></div>
      <div class="actions">
        <button class="btn-green" id="revealAllBtn">정답 전체 보기</button>
        <button class="btn-ghost" id="hideAllBtn">전체 다시 가리기</button>
        <button class="btn-ghost" id="reshuffleBtn">빈칸 다시 섞기</button>
        <button class="btn-nav" id="prevBtn">← 이전</button>
        <button class="btn-nav" id="nextBtn">다음 →</button>
      </div>
    </div>

    <div class="card">
      <div class="qnum" style="margin-bottom:10px;">인쇄하기 (현재 선택된 스토리 전체)</div>
      <div class="actions" style="margin-top:0;">
        <button class="btn-print" id="printWorksheetBtn">학생용 인쇄 (빈칸)</button>
        <button class="btn-print" id="printAnswerBtn">정답지 인쇄</button>
        <button class="btn-ghost" id="printReshuffleBtn">인쇄용 빈칸 다시 섞기</button>
      </div>
    </div>
  </div>

  <!-- GRAMMAR QUIZ TAB -->
  <div class="tab-panel" id="grammarPanel">
    <div class="toolbar">
      <label>레벨</label>
      <select id="grammarLevelSelect"></select>
    </div>

    <div class="progress-dots" id="grammarDots"></div>

    <div class="card">
      <div class="qnum" id="gqnum"></div>
      <div class="qtext" id="gqtext"></div>
      <div class="astem" id="gastem"></div>
      <div class="choices" id="gchoices"></div>
      <div class="actions">
        <button class="btn-nav" id="gPrevBtn">← 이전</button>
        <button class="btn-nav" id="gNextBtn">다음 →</button>
      </div>
    </div>

    <div class="card">
      <div class="qnum" style="margin-bottom:10px;">인쇄하기 (현재 선택된 레벨 전체)</div>
      <div class="actions" style="margin-top:0;">
        <button class="btn-print" id="gPrintWorksheetBtn">학생용 인쇄 (빈칸)</button>
        <button class="btn-print" id="gPrintAnswerBtn">정답지 인쇄</button>
      </div>
    </div>
  </div>
</div>

<div id="printArea"></div>

let storyIdx = 0;
let qIdx = 0;
let fontSize = 21;
let printBlanksCache = {};

const storySelect = document.getElementById('storySelect');
const difficultySelect = document.getElementById('difficultySelect');
const dotsEl = document.getElementById('dots');

const qtextEl = document.getElementById('qtext');

const printArea = document.getElementById('printArea');

STORY_DATA.forEach((s, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = s.code + '  ' + s.title;
  storySelect.appendChild(opt);
});

function pickBlanks(tokens, ratio) {
  const candidates = tokens.map((t, i) => t.b ? i : -1).filter(i => i >= 0);
  if (ratio === 'fixed') {
    const n = Math.max(1, Math.round(candidates.length * 0.3));
    const picked = [];
    for (let i = 0; i < n; i++) {
      picked.push(candidates[Math.floor(i * candidates.length / n)]);
    }
    return new Set(picked);
  }
  const n = Math.max(1, Math.min(candidates.length, Math.round(candidates.length * ratio)));
  const shuffled = candidates.slice().sort(() => Math.random() - 0.5);
  return new Set(shuffled.slice(0, n));
}

function renderQuestion() {
  const story = STORY_DATA[storyIdx];
  const q = story.questions[qIdx];
  const ratio = difficultySelect.value === 'fixed' ? 'fixed' : parseFloat(difficultySelect.value);
  const blankSet = pickBlanks(q.tokens, ratio);

  qnumEl.textContent = story.code + ' · Q' + (qIdx + 1) + ' / ' + story.questions.length;
  qtextEl.textContent = q.q;

  answerEl.innerHTML = '';
  q.tokens.forEach((tok, i) => {
    if (blankSet.has(i)) {
      const span = document.createElement('span');
      span.className = 'blank';
      span.textContent = tok.t;
      span.style.minWidth = Math.max(40, tok.t.length * 13) + 'px';
      span.onclick = () => span.classList.toggle('revealed');
      answerEl.appendChild(span);
    } else {
      answerEl.appendChild(document.createTextNode(tok.t));
    }
  });

  applyFontSize();
  renderDots();
}

function renderDots() {
  const story = STORY_DATA[storyIdx];
  dotsEl.innerHTML = '';
  story.questions.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === qIdx ? ' current' : '');
    d.textContent = i + 1;
    d.onclick = () => { qIdx = i; renderQuestion(); };
    dotsEl.appendChild(d);
  });
}

function applyFontSize() {
  answerEl.style.fontSize = fontSize + 'px';
}

function getPrintBlanks(idx, ratio) {
  const cached = printBlanksCache[idx];
  if (cached && cached.ratio === ratio) return cached.blanks;
  const story = STORY_DATA[idx];
  const blanks = story.questions.map(q => pickBlanks(q.tokens, ratio));
  printBlanksCache[idx] = { ratio, blanks };
  return blanks;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function buildStoryPrintArea(showAnswers) {
  const story = STORY_DATA[storyIdx];
  const ratio = difficultySelect.value === 'fixed' ? 'fixed' : parseFloat(difficultySelect.value);
  const blanksArr = getPrintBlanks(storyIdx, ratio);

  let html = '<div class="print-title">' + story.code + '. ' + story.title + '</div>';
  html += '<div class="print-sub">' + (showAnswers ? '정답지 (Answer Key)' : '이름: ______________   날짜: ______________') + '</div>';

  story.questions.forEach((q, qi) => {
    const blankSet = blanksArr[qi];
    html += '<div class="print-q">';
    html += '<div class="print-qnum">Q' + (qi + 1) + '. ' + escapeHtml(q.q) + '</div>';
    html += '<div class="print-answer">';
    q.tokens.forEach((tok, i) => {
      if (blankSet.has(i)) {
        if (showAnswers) {
          html += '<span class="print-blank-answer">' + escapeHtml(tok.t) + '</span>';
        } else {
          const width = Math.max(50, tok.t.length * 10);
          html += '<span class="print-blank-line" style="width:' + width + 'px;">&nbsp;</span>';
        }
      } else {
        html += escapeHtml(tok.t);
      }
    });
    html += '</div></div>';
  });

  printArea.innerHTML = html;
}

  if (difficultySelect.value === 'fixed') {
    alert('기본(고정) 모드는 항상 같은 빈칸이에요. 다양한 버전을 원하시면 난이도를 랜덤(적게/보통/많이)으로 바꿔주세요.');

  alert('인쇄용 빈칸을 새로 섞었어요. 이제 인쇄 버튼을 눌러주세요.');
};

let gLevelIdx = 0;

const gqtextEl = document.getElementById('gqtext');

GRAMMAR_LEVELS.forEach((lvl, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  opt.textContent = lvl + ' Grammar Quiz';
  grammarLevelSelect.appendChild(opt);
});

function currentGrammarSet() {
  return GRAMMAR_DATA[GRAMMAR_LEVELS[gLevelIdx]];
}

function renderBlankText(text, revealBlank, correctText) {
  // returns DOM fragment with the ___ replaced by a blank span
  const frag = document.createDocumentFragment();
  const parts = text.split(/_{3,}/);
  parts.forEach((part, i) => {
    if (part) frag.appendChild(document.createTextNode(part));
    if (i < parts.length - 1) {
      const span = document.createElement('span');
      span.className = 'blank' + (revealBlank ? '' : ' static');
      span.textContent = correctText;
      span.style.minWidth = Math.max(40, correctText.length * 11) + 'px';
      if (revealBlank) {
        span.onclick = () => span.classList.toggle('revealed');
      }
      frag.appendChild(span);
    }
  });
  return frag;
}

function renderGrammarQuestion() {
  const set = currentGrammarSet();
  const item = set[gQIdx];

  gqnumEl.textContent = GRAMMAR_LEVELS[gLevelIdx] + ' · Q' + (gQIdx + 1) + ' / ' + set.length;

  gqtextEl.innerHTML = '';
  gastemEl.innerHTML = '';
  gchoicesEl.innerHTML = '';

  const hasChoices = !!item.choices;

  if (item.blank_in === 'q') {
    gqtextEl.appendChild(document.createTextNode('Q: '));
    gqtextEl.appendChild(renderBlankText(item.q, !hasChoices, item.correct_text));
  } else {
    gqtextEl.textContent = 'Q: ' + item.q;
  }

  if (item.a) {
    if (item.blank_in === 'a') {
      gastemEl.appendChild(document.createTextNode('A: '));
      gastemEl.appendChild(renderBlankText(item.a, !hasChoices, item.correct_text));
    } else {
      gastemEl.textContent = 'A: ' + item.a;
    }
  }

  if (hasChoices) {
    item.choices.forEach((choice, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.textContent = choice;
      btn.onclick = () => {
        if (btn.disabled) return;
        const buttons = gchoicesEl.querySelectorAll('.choice-btn');
        buttons.forEach(b => b.disabled = true);
        const blankSpans = document.querySelectorAll('#gqtext .blank.static, #gastem .blank.static');
        if (i === item.correct_index) {
          btn.classList.add('correct');
          blankSpans.forEach(s => s.classList.add('filled-correct'));
        } else {
          btn.classList.add('wrong');
          buttons[item.correct_index].classList.add('correct');
          blankSpans.forEach(s => s.classList.add('filled-wrong'));
        }
      };
      gchoicesEl.appendChild(btn);
    });
  }

  renderGrammarDots();
}

function renderGrammarDots() {
  const set = currentGrammarSet();
  grammarDots.innerHTML = '';
  set.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === gQIdx ? ' current' : '');
    d.textContent = i + 1;
    d.onclick = () => { gQIdx = i; renderGrammarQuestion(); };
    grammarDots.appendChild(d);
  });
}

function buildGrammarPrintArea(showAnswers) {
  const set = currentGrammarSet();
  const level = GRAMMAR_LEVELS[gLevelIdx];
  let html = '<div class="print-title">' + level + ' Grammar Quiz</div>';
  html += '<div class="print-sub">' + (showAnswers ? '정답지 (Answer Key)' : '이름: ______________   날짜: ______________') + '</div>';

  set.forEach((item, qi) => {
    html += '<div class="print-q">';
    html += '<div class="print-qnum">Q' + (qi + 1) + '</div>';

    function lineHtml(label, text, hasBlankHere) {
      if (!text) return '';
      if (hasBlankHere) {
        const parts = text.split(/_{3,}/);
        let inner = '';
        parts.forEach((part, i) => {
          inner += escapeHtml(part);
          if (i < parts.length - 1) {
            if (showAnswers) {
              inner += '<span class="print-blank-answer">' + escapeHtml(item.correct_text) + '</span>';
            } else {
              const w = Math.max(50, item.correct_text.length * 10);
              inner += '<span class="print-blank-line" style="width:' + w + 'px;">&nbsp;</span>';
            }
          }
        });
        return '<div class="print-qtext">' + label + ': ' + inner + '</div>';
      }
      return '<div class="print-qtext">' + label + ': ' + escapeHtml(text) + '</div>';
    }

    html += lineHtml('Q', item.q, item.blank_in === 'q');
    if (item.a) html += lineHtml('A', item.a, item.blank_in === 'a');
    if (item.choices) {
      const labels = ['①', '②', '③'];
      html += '<div class="print-choices">' + item.choices.map((c, i) => labels[i] + ' ' + escapeHtml(c) + (showAnswers && i === item.correct_index ? ' ✔' : '')).join('    ') + '</div>';
    }
    html += '</div>';
  });

  printArea.innerHTML = html;
}

document.getElementById('gPrevBtn').onclick = () => {
  const set = currentGrammarSet();
  gQIdx = (gQIdx - 1 + set.length) % set.length;
  renderGrammarQuestion();
};
document.getElementById('gNextBtn').onclick = () => {
  const set = currentGrammarSet();
  gQIdx = (gQIdx + 1) % set.length;
  renderGrammarQuestion();
};
grammarLevelSelect.onchange = () => { gLevelIdx = parseInt(grammarLevelSelect.value, 10); gQIdx = 0; renderGrammarQuestion(); };
document.getElementById('gPrintWorksheetBtn').onclick = () => { buildGrammarPrintArea(false); window.print(); };
document.getElementById('gPrintAnswerBtn').onclick = () => { buildGrammarPrintArea(true); window.print(); };

renderGrammarQuestion();
</script>
